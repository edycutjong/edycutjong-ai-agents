<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#BE185D" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#DB2777" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0D1117" rx="128" />

  <!-- Package / Box -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Box Left Face -->
    <path d="M-100 0 L0 50 L0 150 L-100 100 Z" fill="none" stroke="url(#primaryGrad)" stroke-width="20" stroke-linejoin="round" />
    <!-- Box Right Face -->
    <path d="M0 50 L100 0 L100 100 L0 150 Z" fill="none" stroke="url(#primaryGrad)" stroke-width="20" stroke-linejoin="round" />
    <!-- Box Top Face -->
    <path d="M-100 0 L0 -50 L100 0 L0 50 Z" fill="none" stroke="url(#primaryGrad)" stroke-width="20" stroke-linejoin="round" />
    
    <!-- Box Details -->
    <line x1="-50" y1="-25" x2="0" y2="0" stroke="url(#primaryGrad)" stroke-width="12" stroke-linecap="round" />
    <line x1="50" y1="-25" x2="0" y2="0" stroke="url(#primaryGrad)" stroke-width="12" stroke-linecap="round" />
  </g>

  <!-- Upward Arrow representing update -->
  <g transform="translate(256, 210)" filter="url(#glow)">
    <path d="M0 50 L0 -80 M0 -80 L-40 -40 M0 -80 L40 -40" fill="none" stroke="url(#accentGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Circular arrows around box -->
    <path d="M-160 0 A 160 160 0 0 1 -40 -150" fill="none" stroke="url(#accentGrad)" stroke-width="20" stroke-linecap="round" opacity="0.6" />
    <polygon points="-40,-150 -60,-130 -20,-130" fill="url(#accentGrad)" opacity="0.6" />
    
    <path d="M160 80 A 160 160 0 0 1 40 -120" fill="none" stroke="url(#accentGrad)" stroke-width="20" stroke-linecap="round" opacity="0.6" />
    <polygon points="40,-120 20,-100 60,-100" fill="url(#accentGrad)" opacity="0.6" />
  </g>

</svg>
